<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Dashboard</title>
<style>
  @font-face {
    font-family: 'Excalifont';
    src: url('https://excalidraw.nyc3.cdn.digitaloceanspaces.com/fonts/Excalifont-Regular.woff2') format('woff2');
    font-display: swap;
  }
  @font-face {
    font-family: 'Virgil';
    src: url('https://raw.githubusercontent.com/excalidraw/virgil/main/Virgil.woff2') format('woff2');
    font-display: swap;
  }
  @import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-tc-web@latest/lxgwwenkaitc-regular/result.css');
  @import url('https://cdn.jsdelivr.net/npm/comic-mono@0.0.1/index.css');

  :root {
    --bg: #0b0d11;
    --surface: #151821;
    --surface2: #1e2230;
    --surface3: #262b3a;
    --border: #2a2f40;
    --border-hover: #3d4460;
    --text: #e4e4e7;
    --text-muted: #8b8fa4;
    --text-dim: #5c6078;
    --accent: #818cf8;
    --accent2: #a78bfa;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --cyan: #22d3ee;
    --orange: #fb923c;
    --pink: #f472b6;
    --font-hand: 'Excalifont', 'Virgil', 'LXGW WenKai TC', sans-serif;
    --font-cjk: 'LXGW WenKai TC', 'Excalifont', sans-serif;
    --font-code: 'Comic Mono', monospace;
    --font-mixed: 'Excalifont', 'LXGW WenKai TC', 'Virgil', sans-serif;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mixed);
    line-height: 1.6;
  }

  /* ===== HEADER ===== */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11,13,17,0.82);
    backdrop-filter: blur(16px) saturate(1.4);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-logo {
    font-family: var(--font-hand);
    font-size: 1.5rem;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header-logo span { color: var(--text-muted); font-size: 1rem; margin-left: 6px; }
  .search-wrap {
    flex: 1;
    max-width: 520px;
    position: relative;
  }
  .search-wrap .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 38px;
    font-family: var(--font-mixed);
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .kbd {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--surface3);
    color: var(--text-dim);
    font-family: var(--font-code);
    font-size: 0.7rem;
    padding: 2px 7px;
    border-radius: 5px;
    border: 1px solid var(--border);
  }
  .nav-links {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.15s;
    font-family: var(--font-hand);
  }
  .nav-links a:hover { background: var(--surface2); color: var(--text); }

  /* ===== CONTAINER ===== */
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 28px 60px; }

  /* ===== SECTION ===== */
  .section { margin-bottom: 44px; }
  .section-title {
    font-family: var(--font-hand);
    font-size: 1.45rem;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .section-title .count {
    font-size: 0.8rem;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 10px;
    border-radius: 10px;
    font-family: var(--font-code);
  }

  /* ===== QUICK LAUNCH ===== */
  .launch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .launch-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .launch-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .launch-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .launch-card .lc-icon {
    font-size: 1.6rem;
    margin-bottom: 10px;
  }
  .launch-card .lc-name {
    font-family: var(--font-hand);
    font-size: 1.2rem;
    margin-bottom: 4px;
  }
  .launch-card .lc-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-family: var(--font-cjk);
  }
  .launch-card .lc-cmd {
    font-family: var(--font-code);
    font-size: 0.78rem;
    color: var(--text-dim);
    background: var(--surface2);
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
  }
  .lc-indigo::before { background: linear-gradient(90deg, #818cf8, #6366f1); }
  .lc-purple::before { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }
  .lc-cyan::before   { background: linear-gradient(90deg, #22d3ee, #06b6d4); }
  .lc-green::before  { background: linear-gradient(90deg, #34d399, #10b981); }
  .lc-orange::before { background: linear-gradient(90deg, #fb923c, #f97316); }
  .lc-pink::before   { background: linear-gradient(90deg, #f472b6, #ec4899); }

  /* ===== SKILL GRID ===== */
  .skill-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }
  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .skill-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .skill-card .sc-name {
    font-family: var(--font-code);
    font-size: 0.88rem;
    color: var(--accent);
  }
  .skill-card .sc-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    font-family: var(--font-cjk);
    line-height: 1.4;
  }
  .skill-card .sc-tag {
    display: inline-block;
    font-size: 0.68rem;
    color: var(--text-dim);
    background: var(--surface3);
    padding: 1px 8px;
    border-radius: 6px;
    font-family: var(--font-code);
    align-self: flex-start;
    margin-top: 2px;
  }

  /* ===== HERMES CATEGORIES ===== */
  .cat-group {
    margin-bottom: 8px;
  }
  .cat-group summary {
    cursor: pointer;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--font-mixed);
    font-size: 0.95rem;
    color: var(--text);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
    user-select: none;
  }
  .cat-group summary::-webkit-details-marker { display: none; }
  .cat-group summary:hover { background: var(--surface2); border-color: var(--border-hover); }
  .cat-group summary .chevron {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }
  .cat-group[open] summary .chevron { transform: rotate(90deg); }
  .cat-group[open] summary { border-radius: 10px 10px 0 0; border-bottom-color: transparent; }
  .cat-group .cat-body {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 12px;
    background: var(--surface);
  }
  .cat-count {
    font-family: var(--font-code);
    font-size: 0.72rem;
    background: var(--surface3);
    padding: 1px 8px;
    border-radius: 8px;
    color: var(--text-dim);
  }
  .cat-icon { font-size: 1rem; }

  /* ===== MCP CARDS ===== */
  .mcp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .mcp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mcp-card:hover { border-color: var(--accent); }
  .mcp-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .mcp-dot.active { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.4); }
  .mcp-dot.warn { background: var(--yellow); }
  .mcp-dot.off { background: var(--text-dim); }
  .mcp-info .mcp-name { font-family: var(--font-hand); font-size: 1.05rem; }
  .mcp-info .mcp-cmd { font-family: var(--font-code); font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
  .mcp-info .mcp-desc { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; font-family: var(--font-cjk); }

  /* ===== STATUS ===== */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.88rem;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.ok { background: var(--green); }
  .status-dot.warn { background: var(--yellow); }
  .status-dot.err { background: var(--red); }
  .status-label { color: var(--text-muted); font-family: var(--font-cjk); }
  .status-val { margin-left: auto; font-family: var(--font-code); font-size: 0.78rem; color: var(--text-dim); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface3);
    border: 1px solid var(--border-hover);
    color: var(--text);
    font-family: var(--font-code);
    font-size: 0.85rem;
    padding: 12px 20px;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ===== HIDDEN ===== */
  .hidden { display: none !important; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .header { padding: 10px 16px; gap: 10px; flex-wrap: wrap; }
    .nav-links { display: none; }
    .container { padding: 20px 14px 40px; }
    .launch-grid { grid-template-columns: 1fr 1fr; }
    .skill-grid { grid-template-columns: 1fr; }
  }

  @media print {
    .header { position: static; backdrop-filter: none; }
    body { background: white; color: black; }
  }
</style>
</head>

// ===== CLIPBOARD & TOAST =====

function copy(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied: ' + text)).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copied: ' + text);
  });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== SEARCH =====

function filterAll(q) {
  const query = q.toLowerCase().trim();
  document.querySelectorAll('[data-search]').forEach(el => {
    if (!query) { el.classList.remove('hidden'); return; }
    const match = el.dataset.search.toLowerCase().includes(query);
    el.classList.toggle('hidden', !match);
  });
  // Show/hide category groups based on children visibility
  document.querySelectorAll('.cat-group').forEach(g => {
    const summary = g.querySelector('summary');
    const cards = g.querySelectorAll('.skill-card');
    const anyVisible = [...cards].some(c => !c.classList.contains('hidden'));
    if (query && anyVisible) { g.open = true; g.classList.remove('hidden'); }
    else if (query && !anyVisible) { g.classList.add('hidden'); }
    else { g.classList.remove('hidden'); g.open = false; }
  });
}

// ===== INIT =====

document.addEventListener('DOMContentLoaded', () => {
  renderLaunch();
  renderClaude();
  renderHermes();
  renderMCP();
  renderStatus();

  const input = document.getElementById('searchInput');
  input.addEventListener('input', e => filterAll(e.target.value));

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== input) {
      e.preventDefault();
      input.focus();
    }
    if (e.key === 'Escape') {
      input.value = '';
      filterAll('');
      input.blur();
    }
  });
});
